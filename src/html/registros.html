<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Barber Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/Inicio_Sesion.css">
    <link rel="shortcut icon" href="../assets/imgs/barberia.png" type="image/x-icon">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../assets/imgs/barberia.png" alt="Logo Barber Solutions">
                <h2>Barbery Solutions</h2>
            </div>
            <div class="navbar-buttons">
                <a href="Inicio_Sesion.html" class="btn-link btn-login">Volver al inicio de sesión</a>
            </div>
        </nav>
    </header>

    <div class="card">

        <form id="registro">
            <div class="campo">
                <h2>Bienvenido de nuevo</h2>
                <p>Por favor Ingresar tus credenciales para registrarte</p>
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Juan Vernando">
            </div>

            <div class="campo">
                <label for="usuario">Correo</label>
                <input type="text" id="correo" placeholder="name@example.com">
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>

                <div class="password-container">
                    <input type="password" id="password" placeholder="Contraseña">
                    <button type="button" id="mostrarPassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="(+57) 35496106">
            </div>

            <div class="campo">
                <label for="fecha">Fecha de Nacimiento</label>
                <input type="date" id="fecha">
            </div>

            <button type="submit" class="btn1">Registrarse</button>
            <div class="raya"></div>
            <p>¿Ya tienes cuenta? <a href="Inicio_Sesion.html">Iniciar sesión</a></p>
        </form>
    </div>

    <footer>
        <section class="footer-brand">
            <div class="logo-container">
                <img src="../assets/imgs/barberia.png" alt="Logo">
                <h1>Barbery Solution</h1>
            </div>
            <span>&copy; 2026 Barbery Solution. Todos los derechos reservados</span>
        </section>
        <div class="footer-socials">
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/views/Ojo.js"></script>
</body>

</html>
